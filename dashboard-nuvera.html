<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard NuveraPRO — Trabajo y Rendimientos</title>
<style>
*{box-sizing:border-box} html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0f172a;color:#e2e8f0}
.top{display:flex;align-items:center;gap:6px;padding:10px 16px;background:#0b1220;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:5}
.top h1{font-size:15px;margin:0 14px 0 0;font-weight:700;white-space:nowrap}
.tab{background:transparent;color:#94a3b8;border:1px solid transparent;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
.tab:hover{color:#e2e8f0;background:#131f38}
.tab.active{color:#fff;background:#1e293b;border-color:#334155}
.frame{position:absolute;top:53px;left:0;right:0;bottom:0;width:100%;border:0;display:none;background:#0f172a}
.frame.active{display:block}
</style></head>
<body>
<div class="top">
  <h1>&#128202; Dashboard NuveraPRO</h1>
  <button class="tab active" data-t="r">Rendimientos &middot; Cuentas creadas</button>
  <button class="tab" data-t="w">Trabajo &middot; Vincular capacitaciones</button>
</div>
<iframe id="fr" class="frame active" src="cuentas-prueba.html"></iframe>
<iframe id="fw" class="frame" src="vincular-capacitaciones.html"></iframe>
<script>
var tabs=document.querySelectorAll(".tab");
tabs.forEach(function(b){ b.addEventListener("click",function(){
  tabs.forEach(function(x){x.classList.remove("active")}); b.classList.add("active");
  var t=b.getAttribute("data-t");
  document.getElementById("fr").classList.toggle("active", t==="r");
  document.getElementById("fw").classList.toggle("active", t==="w");
});});
</script>
</body></html>
